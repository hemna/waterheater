<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Water Heater Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/main.css" rel="stylesheet">
    <script src="/static/main.js"></script>
    <script>
        $(document).ready(function() {
            var initialTemp = parseInt('{{ initial_temperature|safe }}', 10) || 108;
            $("#currentTemperature").val(initialTemp);
            $("#tempDisplay").text(initialTemp);

            $("#increaseTemp").click(function() {
                socket.emit('change_temperature', {'temperature': 1});
            });
            $("#decreaseTemp").click(function() {
                socket.emit('change_temperature', {'temperature': -1});
            });
            $("#setTemperature").click(function() {
                socket.emit('set_temperature_reading', {'temperature': $("#currentTemperature").val()});
            });
            $("#lowTemperature").click(function() {
                socket.emit('set_temperature', {'temperature': 97});
            });
            $("#highTemperature").click(function() {
                socket.emit('set_temperature', {'temperature': 108});
            });
            $("#startTimer").click(function() {
                var minutes = parseInt($("#timerDuration").val(), 10) || 30;
                socket.emit('set_timer', {'duration_minutes': minutes});
            });
            $("#forceReset").click(function() {
                socket.emit('force_reset', {});
            });
        });
    </script>
</head>
<body>
    <div class="app">
        <header class="app-header">
            <h1 class="app-title">Water Heater</h1>
            <p class="app-subtitle">Temperature & timer control</p>
        </header>

        <main class="app-main">
            <section class="card card-temp">
                <h2 class="card-title">Temperature</h2>
                <div class="temp-hero">
                    <span id="tempDisplay" class="temp-value">—</span>
                    <span class="temp-unit">°F</span>
                </div>
                <div class="temp-actions">
                    <button type="button" id="decreaseTemp" class="btn btn-ctrl btn-ctrl-down" aria-label="Decrease temperature">
                        <span class="btn-ctrl-icon">−</span>
                    </button>
                    <button type="button" id="increaseTemp" class="btn btn-ctrl btn-ctrl-up" aria-label="Increase temperature">
                        <span class="btn-ctrl-icon">+</span>
                    </button>
                </div>
                <div class="temp-sync">
                    <label for="currentTemperature" class="visually-hidden">Current reading on heater</label>
                    <input id="currentTemperature" class="input-sync" type="number" inputmode="numeric" min="90" max="130" value="108">
                    <button type="button" id="setTemperature" class="btn btn-sync">Sync reading</button>
                </div>
                <div class="temp-presets">
                    <button type="button" id="lowTemperature" class="btn btn-preset">97°F</button>
                    <button type="button" id="highTemperature" class="btn btn-preset btn-preset-high">108°F</button>
                </div>
            </section>

            <section class="card card-timer">
                <h2 class="card-title">Reset timer</h2>
                <p class="card-desc">Return to 108°F after a set time.</p>
                <div class="timer-set">
                    <select id="timerDuration" class="form-select timer-select" aria-label="Reset after">
                        <option value="15">15 min</option>
                        <option value="30" selected>30 min</option>
                        <option value="60">1 hr</option>
                        <option value="120">2 hr</option>
                    </select>
                    <button type="button" id="startTimer" class="btn btn-start">Start timer</button>
                </div>
                <div id="timerCountdown" class="timer-countdown" role="status" aria-live="polite" hidden></div>
                <button type="button" id="forceReset" class="btn btn-force">Force reset to 108°F</button>
            </section>

            <div id="result" class="status" role="status" aria-live="polite"></div>
        </main>
    </div>
</body>
</html>
